{% extends "site_base.html" %}

{% block content %}

<h2>{{university}} University Dashboard</h2>

<a href="/create-assessment">
<button style="padding:10px 20px;background:#2563eb;color:white;border:none">
Create Assessment
</button>
</a>

<h3 style="margin-top:30px">Your Assessments</h3>

{% if assessments %}

<ul>

{% for a in assessments %}
<li>{{a.title}} - {{a.category}}</li>
{% endfor %}

</ul>

{% else %}

<p>No assessments created yet.</p>

{% endif %}

{% endblock %}
