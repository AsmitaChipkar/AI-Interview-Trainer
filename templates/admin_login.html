<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.admin-box{
width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:45px;
border-radius:22px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.1);
}

.admin-icon{
font-size:52px;
text-align:center;
margin-bottom:10px;
}

.admin-title{
font-size:30px;
font-weight:700;
text-align:center;
margin-bottom:8px;
}

.admin-sub{
text-align:center;
font-size:14px;
opacity:0.85;
margin-bottom:28px;
}

.input-box{
width:100%;
padding:14px;
margin:12px 0;
border:none;
border-radius:12px;
font-size:15px;
outline:none;
background:rgba(255,255,255,0.92);
}

.login-btn{
width:100%;
padding:14px;
margin-top:16px;
background:linear-gradient(135deg,#2563eb,#4f46e5);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

.bottom-note{
margin-top:22px;
text-align:center;
font-size:13px;
opacity:0.75;
}
</style>
</head>

<body>

<div class="admin-box">

<div class="admin-icon">🛡️</div>

<div class="admin-title">InterviewAI Admin</div>

<div class="admin-sub">
Secure control center for platform management
</div>

<form method="POST">

<input type="text" name="username" placeholder="Admin Username" class="input-box">

<input type="password" name="password" placeholder="Admin Password" class="input-box">

<button class="login-btn">Enter Admin Panel</button>

</form>

<div class="bottom-note">
Authorized access only
</div>

</div>

</body>
</html>
