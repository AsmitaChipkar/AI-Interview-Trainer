<!DOCTYPE html>
<html>

<head>

<title>{{title}}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f8fafc;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
position:fixed;
background:#0f172a;
color:white;
padding-top:30px;
}

.sidebar h4{
text-align:center;
margin-bottom:40px;
color:#38bdf8;
}

.sidebar a{
display:block;
color:#cbd5f5;
padding:12px 22px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#1e293b;
padding-left:28px;
}

/* MAIN AREA */

.main{
margin-left:240px;
padding:40px;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#3b82f6,#06b6d4);
padding:25px 30px;
border-radius:14px;
color:white;
margin-bottom:35px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BUTTON */

.main-btn{
background:#2563eb;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:600;
}

.main-btn:hover{
background:#1d4ed8;
}

/* CARD */

.card-ui{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* STAT */

.stat-title{
color:#64748b;
font-size:14px;
}

.stat-number{
font-size:28px;
font-weight:bold;
color:#2563eb;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4>AI Trainer</h4>

<a href="/dashboard">Dashboard</a>

<a href="/start">Start Interview</a>

<a href="/history">Interview History</a>

<a href="/analytics">Skill Analytics</a>

<a href="/profile">Profile</a>

<a href="/logout">Logout</a>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">

<h3>{{title}}</h3>

</div>

{% block content %}

{% endblock %}

</div>

</body>

</html>
