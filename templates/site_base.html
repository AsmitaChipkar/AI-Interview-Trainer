<!DOCTYPE html>
<html>

<head>

<title>InterviewAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */

body{
font-family:Inter, Arial, sans-serif;
background:linear-gradient(180deg,#f8fafc,#eef2ff);
color:#0f172a;
}

/* NAVBAR */

.navbar{
background:white;
border-bottom:1px solid #e2e8f0;
padding:14px 0;
}

/* BRAND */

.navbar-brand{
font-weight:700;
font-size:20px;
color:#2563eb;
}

/* NAV LINKS */

.nav-link{
font-weight:500;
color:#475569;
margin-right:18px;
position:relative;
}

.nav-link:hover{
color:#2563eb;
}

/* ACTIVE */

.nav-link.active{
color:#2563eb;
font-weight:600;
}

.nav-link.active::after{
content:"";
position:absolute;
bottom:-6px;
left:0;
width:100%;
height:3px;
background:#2563eb;
border-radius:3px;
}

/* RIGHT */

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

/* USER */

.user-box{
display:flex;
align-items:center;
gap:8px;
background:#f1f5ff;
padding:6px 12px;
border-radius:20px;
}

.avatar{
width:30px;
height:30px;
background:#2563eb;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* BUTTON */

.start-btn{
background:#2563eb;
color:white;
padding:6px 14px;
border-radius:8px;
text-decoration:none;
}

.start-btn:hover{
background:#1d4ed8;
}

/* ADMIN */

.admin-btn{
background:#2563eb;
color:white !important;
padding:6px 14px;
border-radius:8px;
}

.admin-btn:hover{
background:#1d4ed8;
}

/* SCROLL */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#c7d2fe;
border-radius:10px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="container-fluid px-4 d-flex justify-content-between align-items-center">

<a class="navbar-brand" href="/dashboard">
InterviewAI
</a>

<div class="nav-right">

<a href="/dashboard"
class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
Dashboard
</a>

<a href="/history"
class="nav-link {% if request.path == '/history' %}active{% endif %}">
History
</a>

<a href="/analytics"
class="nav-link {% if request.path == '/analytics' %}active{% endif %}">
Analytics
</a>

<a href="/chat"
class="nav-link {% if request.path == '/chat' %}active{% endif %}">
Chat
</a>

<a href="/profile"
class="nav-link {% if request.path == '/profile' %}active{% endif %}">
Profile
</a>

<a href="/admin-login" class="nav-link admin-btn">
Admin
</a>

<div class="user-box">
<div class="avatar">{{session.username[0]|upper}}</div>
<span>{{session.username}}</span>
</div>

<a href="/logout" class="start-btn">
Logout
</a>

</div>

</div>

</nav>

<!-- FULL WIDTH CONTENT -->

<div class="container-fluid px-4 mt-4">

{% block content %}
{% endblock %}

</div>

</body>

</html>
